<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- Daisy Ui & Taiwind css -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- Css -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>


</head>

<body>

    <section class="min-h-md  max-w-md bg-[#ffffff] mx-auto md:mt-20 mb-20 p-8 md:shadow-2xl rounded-2xl m-4 ">
        <div>

            <div class="logo w-[100px] mx-auto ">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <p class=" font-semibold text-2xl text-center mt-6 text-[#1F2937]">GitHub Issues Tracker</p>
            <p class="text-center text-[#64748B]">Sign in to manage your issues</p>

        </div>


        <div class="form mt-6">

            <div class="card  w-full max-w-sm mx-auto ">
                <div class="">
                    <fieldset class="fieldset">
                        <label class="label text-[#1F2937] font-bold">Username</label>
                        <input id="input-username"  type="text"
                            class="input rounded bg-base-200 w-full" placeholder="Enter Username" />
                        <p class="text-[#4A00FF] ">Default: admin</p>


                        <label class="label text-[#1F2937] font-bold">Password</label>
                        <input id="input-password"  type="text"
                            class="input rounded bg-base-200 w-full" placeholder="Enter Username" />
                        <p class="text-[#4A00FF] ">Default: admin123</p>

                        <button id="login-btn" class="btn btn-primary mt-4 ">Sign In</button>

                        <div class="flex items-center gap-2 mt-6">
                            <hr class="flex-1 border border-gray-200">
                            <span class="text-[#1F2937] font-normal">OR</span>
                            <hr class="flex-1 border border-gray-200">
                        </div>
                    </fieldset>

                    <div class="demo mt-6 text-center">
                        <p class="text-[#64748bFF]">Demo Credentials:</p>

                        <div class="bg-gray-100 rounded p-6">
                            <p> <span class="font-bold">Username:</span> admin</p>
                            <p> <span class="font-bold">Password:</span>  admin123</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>


    <!-- Java Script Link -->
     <script src="./script/signin.js"></script>
</body>

</html>
